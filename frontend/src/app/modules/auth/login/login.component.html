<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-lg auth-card">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-heart-pulse text-primary fs-1"></i>
        <h2 class="mt-2">WeCareForYou</h2>
        <p class="text-muted">Sign in to your account</p>
      </div>

      @if (error) {
        <div class="alert alert-danger">{{ error }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="email"
            [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched" />
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
            <div class="invalid-feedback">Valid email is required</div>
          }
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" formControlName="password"
            [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched" />
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || loading">
          {{ loading ? 'Signing in...' : 'Login' }}
        </button>
      </form>

      <div class="text-center mt-4">
        <a routerLink="/auth/forgot-password" class="text-decoration-none small">Forgot password?</a>
        <p class="mt-2 mb-0 small">Don't have an account? <a routerLink="/auth/register">Register</a></p>
      </div>
    </div>
  </div>
</div>
